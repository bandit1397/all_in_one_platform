<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>현장 대응 디지털 통합 플랫폼</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

.header {
  background: #1e2a38;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.menu {
  display: flex;
  background: #2f3e50;
}

.menu button {
  flex: 1;
  padding: 12px;
  border: none;
  background: #2f3e50;
  color: white;
  cursor: pointer;
}

.menu button:hover {
  background: #4a6278;
}

iframe {
  width: 100%;
  height: calc(100vh - 100px);
  border: none;
}
</style>

<script>
function loadPage(page) {
  document.getElementById("mainFrame").src = page;
}
</script>

</head>

<body>

<div class="header">
🚨 현장 대응 디지털 통합 플랫폼
</div>

<div class="menu">
  <button onclick="loadPage('map.html')">📍 위치</button>
  <button onclick="loadPage('hospital.html')">🚑 병원</button>
  <button onclick="loadPage('checklist.html')">📋 체크리스트</button>
  <button onclick="loadPage('contacts.html')">📞 연락처</button>
</div>

<iframe id="mainFrame" src="map.html"></iframe>

</body>
</html>
